name: Deploy to CloudFront

on:
  push:
    branches:
      - main
    paths:
      - 'client/**'
      - 'lambdas/**'
      - '.github/workflows/**'
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  S3_BUCKET: jesusrugama.demos.cognito-auth
  CLOUDFRONT_DISTRIBUTION_ID: EDX7MCU7N8XVS
  VITE_API_BASE_URL: https://n2azfcvf05.execute-api.us-east-1.amazonaws.com/prod

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::464624688884:role/jesusrugama-sites-github-actions-role
          aws-region: ${{ env.AWS_REGION }}

      # ---- Client ----
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            client/package-lock.json
            lambdas/package-lock.json

      - name: Install client dependencies
        working-directory: client
        run: npm ci

      - name: Build client
        working-directory: client
        run: npm run build
        env:
          VITE_API_BASE_URL: ${{ env.VITE_API_BASE_URL }}

      - name: Deploy client to S3
        run: |
          aws s3 sync client/dist s3://${{ env.S3_BUCKET }}/website --delete

      # ---- Lambdas ----
      - name: Install lambda dependencies
        working-directory: lambdas
        run: npm ci

      - name: Typecheck lambda handlers
        working-directory: lambdas
        run: npm run typecheck

      - name: Package Lambda zips
        working-directory: lambdas
        run: npm run package

      - name: Deploy Lambda zips to S3
        working-directory: lambdas
        run: npm run deploy
        env:
          S3_BUCKET: ${{ env.S3_BUCKET }}
          AWS_REGION: ${{ env.AWS_REGION }}

      # ---- CloudFront ----
      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ env.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"