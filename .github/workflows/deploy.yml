name: Deploy to CloudFront

on:
  push:
    branches:
      - main
    paths:
      - 'client/**'
      - 'server/**'
      - '.github/workflows/**'
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  S3_BUCKET: jesusrugama.demos.cognito-scopes
  CLOUDFRONT_DISTRIBUTION_ID: E2SU6OE8HET74Q

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::464624688884:role/jesusrugama-sites-github-actions-role
          aws-region: ${{ env.AWS_REGION }}

      # ---- Client ----
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install client dependencies
        working-directory: client
        run: npm ci

      - name: Build client
        working-directory: client
        run: npm run build

      - name: Deploy client to S3
        run: |
          aws s3 sync client/dist s3://${{ env.S3_BUCKET }}/website --delete

      # ---- Server ----
      - name: Build edge function
        working-directory: server
        run: |
          npm ci
          npm run package

      - name: Upload edge function to S3
        run: npm run deploy

      # ---- CloudFront ----
      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ env.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"